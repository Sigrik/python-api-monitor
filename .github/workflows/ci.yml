name: CI

on:
 push:
   branches: [ "main" ]

jobs:
 build:
   runs-on: ubuntu-latest
   env:
    PYTHONPATH: .

   steps:
     - name: Checkout
       uses: actions/checkout@v3

     - name: Set up Python
       uses: actions/setup-python@v4
       with:
         python-version: "3.11"

     - name: Install deps
       run: pip install -r requirements.txt
       
     - name: Run tests
       run: pytest

     - name: Build Docker image
       run: docker build -t python-api-monitor .
